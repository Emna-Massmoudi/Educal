<nav class="navbar">

  <!-- LEFT -->
  <a class="navbar-left brand-link" routerLink="/home">
    <div class="logo-icon">🎓</div>
    <span class="brand-text">EduCal</span>
  </a>

  <!-- CENTER -->
  <div class="navbar-center">

    <a class="nav-item"
       [class.active]="isNavItemActive('/home')"
       routerLink="/home">
      Accueil
    </a>

    <a class="nav-item"
       [class.active]="isNavItemActive('/home','categories')"
       [routerLink]="['/home']"
       fragment="categories">
      Catégories
    </a>

    <a class="nav-item"
       [class.active]="isNavItemActive('/home','courses')"
       [routerLink]="['/home']"
       fragment="courses">
      Cours
    </a>

    <a class="nav-item"
       [class.active]="isNavItemActive('/home','features')"
       [routerLink]="['/home']"
       fragment="features">
      Pourquoi EduCal
    </a>

  </div>

  <!-- RIGHT -->
  <div class="navbar-right">

    <!-- NON CONNECTÉ -->
    <a *ngIf="!isAuthenticated"
       routerLink="/login"
       class="btn-login">
      Connexion
    </a>

    <!-- CONNECTÉ -->
    <div *ngIf="isAuthenticated" class="navbar-user">

      <div class="user-avatar">{{ userInitials }}</div>

      <a [routerLink]="[dashboardRoute]" class="btn-dashboard">
        {{ dashboardLabel }}
      </a>

      <button class="btn-logout" (click)="logout()">
        Déconnexion
      </button>

    </div>

  </div>

</nav>


<div class="sidebar__area" [class.sidebar-opened]="showSidebar">
  <div class="sidebar__wrapper">
    <div class="sidebar__close">
      <button type="button" class="sidebar__close-btn" (click)="closeSidebar()">
        <span><i class="fal fa-times"></i></span>
        <span>close</span>
      </button>
    </div>

    <div class="sidebar__content">
      <div class="logo mb-40">
        <a [routerLink]="['/home']" class="brand-link">
          <img src="assets/img/logo/logo.png" alt="Educal" />
        </a>
      </div>

      <nav class="public-mobile-nav">
        <a [routerLink]="['/home']" [class.is-active]="isNavItemActive('/home')">Accueil</a>
        <a [routerLink]="['/home']" fragment="categories" [class.is-active]="isNavItemActive('/home', 'categories')">Categories</a>
        <a [routerLink]="['/home']" fragment="courses" [class.is-active]="isNavItemActive('/home', 'courses')">Cours</a>
        <a *ngIf="shouldShowTeacherCta" [routerLink]="[teacherRoute]" [class.is-active]="isTeacherCtaActive()">Devenir formateur</a>
        <a [routerLink]="['/home']" fragment="features" [class.is-active]="isNavItemActive('/home', 'features')">Pourquoi Educal</a>
        <a *ngIf="!isAuthenticated" [routerLink]="['/login']">Connexion</a>
        <a *ngIf="!isAuthenticated" [routerLink]="['/register']">Creer un compte</a>
        <a *ngIf="isAuthenticated" [routerLink]="[dashboardRoute]">{{ dashboardLabel }}</a>
      </nav>

      <div *ngIf="isAuthenticated" class="public-mobile-account mt-30">
        <div class="public-header__profile">
          <div class="public-header__avatar">{{ userInitials }}</div>
          <div class="public-header__identity">
            <strong>{{ displayName }}</strong>
            <span>{{ roleLabel }}</span>
          </div>
        </div>
      </div>

      <div class="public-mobile-actions mt-30">
        <button
          *ngIf="isAuthenticated"
          type="button"
          class="e-btn e-btn-border public-header__logout w-100"
          (click)="logout()"
        >
          Deconnexion
        </button>
      </div>
    </div>
  </div>
</div>

<div class="body-overlay" [class.opened]="showSidebar" (click)="closeSidebar()"></div>
